{{ if site.Params.newsletter.enabled }}
  {{ if .Params.showNewsletter }}
    {{ with site.Params.newsletter }}
      <section class="pt-8 border-t mt-7 border-neutral-200 dark:border-neutral-700">
        <div class="flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
          <div class="max-w-2xl">
            <h3 class="text-sm font-semibold text-neutral-700 dark:text-neutral-300">
              {{ .title | default "Newsletter" }}
            </h3>
            <p class="mt-1 text-sm text-neutral-500 dark:text-neutral-400">
              {{ .description | default "Get updates in your inbox." }}
            </p>
          </div>
          <form
            action="{{ .action }}"
            method="post"
            target="popupwindow"
            onsubmit="window.open('{{ .action }}','popupwindow')"
            class="flex flex-col w-full max-w-xl gap-2 sm:flex-row">
            <label for="newsletter-email" class="sr-only">Email</label>
            <input
              id="newsletter-email"
              type="email"
              name="email"
              placeholder="{{ .placeholder | default "you@example.com" }}"
              required
              class="w-full px-3 text-sm bg-transparent border rounded-md h-9 border-neutral-300 text-neutral-700 placeholder:text-neutral-400 focus:border-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/20 dark:border-neutral-600 dark:text-neutral-200 dark:placeholder:text-neutral-500" />
            <button
              type="submit"
              class="inline-flex h-9 items-center justify-center rounded-md bg-primary-600 px-4 text-sm font-semibold text-white shadow-sm transition hover:bg-primary-500 focus:outline-none focus:ring-2 focus:ring-primary-500/40 active:scale-[0.98] dark:bg-primary-500 dark:hover:bg-primary-400">
              {{ .buttonText | default "Subscribe" }}
            </button>
          </form>
        </div>
        {{ with .disclaimer }}
          <p class="mt-2 text-xs text-neutral-500 dark:text-neutral-400">{{ . }}</p>
        {{ end }}
      </section>
    {{ end }}
  {{ end }}
{{ end }}
